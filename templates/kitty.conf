# Kitty terminal configuration template
# https://sw.kovidgoyal.net/kitty/conf/

# ━━━ Font ━━━
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# ━━━ Cursor ━━━
cursor_shape          beam
cursor_blink_interval 0.5

# ━━━ Scrollback ━━━
scrollback_lines 10000

# ━━━ Mouse ━━━
copy_on_select        clipboard
mouse_hide_wait       3.0
url_style             curly
detect_urls           yes

# ━━━ Performance ━━━
repaint_delay    10
input_delay      3
sync_to_monitor  yes

# ━━━ Bell ━━━
enable_audio_bell no

# ━━━ Window ━━━
window_padding_width  8
hide_window_decorations yes
confirm_os_window_close 0
background_opacity 0.95

# ━━━ Tab Bar ━━━
tab_bar_edge          bottom
tab_bar_style         powerline
tab_powerline_style   slanted
tab_title_template    "{index}: {title}"
active_tab_font_style bold

# ━━━ Colors (Catppuccin Mocha) ━━━
foreground              #CDD6F4
background              #1E1E2E
selection_foreground     #1E1E2E
selection_background     #F5E0DC
cursor                   #F5E0DC
cursor_text_color        #1E1E2E
url_color                #89B4FA

# Black
color0  #45475A
color8  #585B70

# Red
color1  #F38BA8
color9  #F38BA8

# Green
color2  #A6E3A1
color10 #A6E3A1

# Yellow
color3  #F9E2AF
color11 #F9E2AF

# Blue
color4  #89B4FA
color12 #89B4FA

# Magenta
color5  #F5C2E7
color13 #F5C2E7

# Cyan
color6  #94E2D5
color14 #94E2D5

# White
color7  #BAC2DE
color15 #A6ADC8

# ━━━ Remote Control ━━━
allow_remote_control yes
