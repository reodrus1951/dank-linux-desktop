# Hyprlock configuration template
# Screen locker for Hyprland

general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = false
}

# Background
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.7
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Time display
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(25, 255, 255, 0.9)
    font_size = 72
    font_family = Fira Sans Bold
    position = 0, 200
    halign = center
    valign = center
}

# Date display
label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    color = rgba(255, 255, 255, 0.6)
    font_size = 20
    font_family = Fira Sans
    position = 0, 120
    halign = center
    valign = center
}

# Greeting
label {
    monitor =
    text = Hi, $USER
    color = rgba(255, 255, 255, 0.7)
    font_size = 16
    font_family = Fira Sans
    position = 0, -40
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(100, 100, 100, 0.5)
    inner_color = rgba(30, 30, 46, 0.8)
    font_color = rgb(205, 214, 244)
    fade_on_empty = true
    fade_timeout = 2000
    placeholder_text = <i>🔒 Enter password...</i>
    hide_input = false
    rounding = 15
    check_color = rgb(166, 227, 161)
    fail_color = rgb(243, 139, 168)
    fail_text = <i>Wrong password! ($ATTEMPTS)</i>
    fail_transition = 300
    position = 0, -120
    halign = center
    valign = center
}
