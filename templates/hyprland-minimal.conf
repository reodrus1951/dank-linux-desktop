# Minimal working Hyprland configuration
# This is a safe fallback config — it will always work.
# Use this as a starting point or for recovery.

# ━━━ Monitor ━━━
monitor = , preferred, auto, auto

# ━━━ Input ━━━
input {
    kb_layout = us
    kb_variant = intl
    kb_options = lv3:ralt_switch
    numlock_by_default = true
    follow_mouse = 1
    sensitivity = 0.0
}

# ━━━ General ━━━
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

# ━━━ Decoration ━━━
decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.95

    blur {
        enabled = true
        size = 5
        passes = 2
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

# ━━━ Animations ━━━
animations {
    enabled = true
    bezier = snappy, 0.2, 0.9, 0.3, 1.0
    animation = windows, 1, 4, snappy
    animation = windowsOut, 1, 4, snappy, popin 80%
    animation = fade, 1, 4, snappy
    animation = workspaces, 1, 4, snappy
    animation = border, 1, 3, snappy
}

# ━━━ Layout ━━━
dwindle {
    preserve_split = true
}

# ━━━ Misc ━━━
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
}

# ━━━ Cursor (NVIDIA) ━━━
cursor {
    no_hardware_cursors = true
}

# ━━━ Environment ━━━
env = XCURSOR_SIZE, 24
env = QT_QPA_PLATFORMTHEME, qt6ct

# ━━━ Startup ━━━
exec-once = dbus-update-activation-environment --systemd --all
exec-once = waybar

# ━━━ Keybindings ━━━

# Applications
bind = SUPER, T, exec, kitty
bind = SUPER, E, exec, nautilus
bind = SUPER, B, exec, firefox

# Window management
bind = SUPER, Q, killactive
bind = SUPER, F, fullscreen, 1
bind = SUPER SHIFT, F, fullscreen, 0
bind = SUPER SHIFT, T, togglefloating
bind = SUPER SHIFT, E, exit

# Focus
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d
bind = SUPER, H, movefocus, l
bind = SUPER, J, movefocus, d
bind = SUPER, K, movefocus, u
bind = SUPER, L, movefocus, r

# Move windows
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

# Workspaces
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5

# Mouse binds
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Resize
binde = SUPER, minus, resizeactive, -10% 0
binde = SUPER, equal, resizeactive, 10% 0

# Volume
bindel = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindl = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

# ━━━ Window Rules ━━━
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = center on, match:float 1
